# CI — test + lint on every push
#
# NOTE (Rule 3): This defaults to a PostgreSQL service. If this project uses
# SQLite or no DB, REMOVE the `services: postgres` block and the DATABASE_URL
# env below before first push, or CI will spin up an unused/failing service.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # --- Remove this whole services block for non-Postgres projects (Rule 3) ---
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # dev tools (bootstrap installs these into the same env; if you keep
          # a separate requirements-dev.txt, install it here instead)
          pip install pytest pytest-asyncio pytest-cov ruff mypy respx

      - name: Lint
        run: ruff check src/

      - name: Type check
        run: mypy src/

      - name: Run tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
        run: |
          pytest --cov=src --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
