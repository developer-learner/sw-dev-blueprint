name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  template-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check BLUEPRINT.md line count (max 450)
        run: |
          LINES=$(wc -l < BLUEPRINT.md)
          if [ "$LINES" -gt 450 ]; then
            echo "FAIL: BLUEPRINT.md is $LINES lines (max 450)"
            exit 1
          fi
          echo "OK: BLUEPRINT.md is $LINES lines"

  test:
    runs-on: ubuntu-latest
    # Skip CI if this is the bare template (no requirements.txt)
    if: hashFiles('requirements.txt') != ''
    # --- Postgres for projects that need it (uncomment both blocks below) ---
    # services:
    #   postgres:
    #     image: postgres:15
    #     env:
    #       POSTGRES_USER: testuser
    #       POSTGRES_PASSWORD: testpass
    #       POSTGRES_DB: testdb
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5
    #     ports:
    #       - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-json-report ruff mypy respx
      - name: Lint
        run: ruff check src/
      - name: Type check
        run: mypy src/
      # If using Postgres, uncomment DATABASE_URL and the services block above:
      # - name: Run tests
      #   env:
      #     DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      #   run: pytest --cov=src --cov-report=term-missing --cov-fail-under=80
      - name: Run tests
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=80 --json-report --json-report-file=.cache/test-report.json
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
